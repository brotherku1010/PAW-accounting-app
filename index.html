<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4b6cb7">
    <title>專屬記帳 APP</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />

    <style>
        /* ================= 系統共用變數與全域設定 (科技黑夜風) ================= */
        :root {
            /* 主色調：科技紫搭配發光效果 */
            --primary: rgba(159, 53, 255, 0.8);
            --primary-glow: rgba(159, 53, 255, 0.4);
            /* 背景與卡片：深邃黑與毛玻璃 */
            --bg: #12121a;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            /* 文字顏色 */
            --text-main: #ffffff;
            --text-muted: #9aa0a6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #08080c;
            /* 電腦版外圍純黑背景 */
            color: var(--text-main);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            font-size: 16px;
            color-scheme: dark;
            /* 讓瀏覽器原生的捲軸、日期選擇器自動變暗色 */
        }

        /* 手機直版框架 + 背景環境光點綴 */
        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background-color: var(--bg);
            /* 加入右上角的隱約紫色環境光 */
            background-image: radial-gradient(circle at 80% 0%, rgba(159, 53, 255, 0.15) 0%, transparent 40%);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow-x: hidden;
        }

        .page {
            display: none;
            padding: 20px;
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            padding-bottom: 100px;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
                filter: blur(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* ================= 元件樣式 (毛玻璃與發光) ================= */

        /* 頂部月份切換器 */
        .month-selector {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            /* 毛玻璃模糊效果 */
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #d6a5ff;
            /* 亮紫色文字 */
            font-size: 18px;
        }

        .month-selector button {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0 10px;
            transition: color 0.2s;
        }

        .month-selector button:active {
            color: white;
        }

        /* 主視覺：帳目餘額卡片 */
        .balance-card {
            background: linear-gradient(135deg, rgba(159, 53, 255, 0.6) 0%, rgba(89, 28, 158, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 24px;
            padding: 25px;
            /* 強烈的科技發光陰影 */
            box-shadow: 0 12px 30px var(--primary-glow), inset 0 2px 5px rgba(255, 255, 255, 0.2);
            margin-bottom: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* 卡片內部的反光裝飾線 */
        .balance-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: skewX(-25deg);
        }

        .balance-card .title {
            font-size: 15px;
            opacity: 0.8;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .balance-card .amount {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 15px;
            font-family: monospace;
        }

        .balance-card .details {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 15px;
            border-radius: 14px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 選單網格 */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .menu-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .menu-item:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.08);
        }

        .menu-item .icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        .menu-item .text {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        /* 浮動新增按鈕 (FAB) */
        .fab {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #b864ff, #801acc);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 34px;
            box-shadow: 0 8px 25px var(--primary-glow);
            cursor: pointer;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .fab:active {
            transform: scale(0.9) rotate(15deg);
        }

        /* 第二層頁面共用標頭 */
        .page-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--card-border);
        }

        .page-header .back-btn {
            font-size: 22px;
            margin-right: 15px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .page-header h2 {
            margin: 0;
            font-size: 20px;
            color: white;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* ================= 表單專屬樣式 (暗黑科技感) ================= */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* 輸入框暗黑化與完美置中修復 */
        .form-group input,
        .form-group select {
            width: 85%;
            /* 大幅縮小為 85%，給兩側留出絕對充裕的空間 */
            max-width: 320px;
            /* 增加最大寬度限制 */
            margin: 0 auto;
            /* 強制水平置中 */
            padding: 14px 15px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            font-size: 16px;
            font-family: inherit;
            background-color: rgba(0, 0, 0, 0.2);
            color: white;
            box-sizing: border-box;
            display: block;
            transition: all 0.2s;
            text-align: center;
            /* 讓輸入框與選單裡面的數值也置中 */
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        /* 針對日期的圖示反白 */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
        }

        /* 切換按鈕暗黑化 */
        .toggle-group {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            padding: 6px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--card-border);
        }

        .toggle-btn {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            white-space: nowrap;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* 底部儲存按鈕 */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #b864ff, #801acc);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 6px 20px var(--primary-glow);
            transition: transform 0.1s;
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        /* ================= 恐龍全息投影特效 ================= */
        .dino-mascot {
            position: absolute;
            z-index: 0;
            opacity: 0.35;
            /* 因為拿掉濾鏡了，透明度稍微調高一點讓原圖更清楚 */
            pointer-events: none;

            /* 修改遮罩：把 black 30% 縮小到 15%，透明邊界從 70% 縮小到 60%，這樣就能切除更多邊緣，只保留主體 */
            mask-image: radial-gradient(circle at center, black 15%, transparent 60%);
            -webkit-mask-image: radial-gradient(circle at center, black 15%, transparent 60%);

            animation: floatDino 6s ease-in-out infinite alternate;
            /* ★ 已經將原本的 filter (紫色濾鏡) 刪除，現在會完全呈現照片原本的顏色！ */
        }

        @keyframes floatDino {
            0% {
                transform: translateY(0px) rotate(-2deg);
            }

            100% {
                transform: translateY(-15px) rotate(2deg);
            }
        }

        /* 確保所有頁面內容在恐龍之上 */
        .page {
            position: relative;
            z-index: 10;
        }

        /* 調整新圖標的大小與排版 */
        .menu-item .material-symbols-outlined {
            font-size: 36px;
            margin-bottom: 12px;
            display: block;
            color: #d6a5ff;
            /* 統一使用亮紫色 */
            filter: drop-shadow(0 0 8px var(--primary-glow));
            /* 圖標發光 */
        }
    </style>
</head>

<body>

    <div class="app-container">

        <div id="page-home" class="page active">

            <div class="month-selector">
                <button onclick="changeMonth(-1)">❮</button>
                <span id="current-month-display">2026年 06月</span>
                <button onclick="changeMonth(1)">❯</button>
            </div>

            <div class="balance-card">
                <div class="title">本月結餘 (淨利潤)</div>
                <div class="amount" id="balance-amount">$ 15,400</div>
                <div class="details">
                    <div>📥 收入: $20,000</div>
                    <div>📤 支出: $4,600</div>
                </div>
            </div>

            <div class="menu-grid">
                <div class="menu-item" onclick="switchPage('page-report')">
                    <span class="material-symbols-outlined">bar_chart</span>
                    <span class="text">收支報表</span>
                </div>
                <div class="menu-item" onclick="switchPage('page-details')">
                    <span class="material-symbols-outlined">receipt_long</span>
                    <span class="text">收支明細</span>
                </div>
                <div class="menu-item" onclick="switchPage('page-chart')">
                    <span class="material-symbols-outlined">donut_small</span>
                    <span class="text">支出報告圖</span>
                </div>
                <div class="menu-item" onclick="switchPage('page-raw')">
                    <span class="material-symbols-outlined">database</span>
                    <span class="text">原始資料</span>
                </div>
            </div>

            <div class="fab" onclick="switchPage('page-add')">＋</div>
        </div>


        <div id="page-add" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>新增記帳</h2>
            </div>

            <div
                style="background: var(--card-bg); padding: 25px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">

                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="form-date">
                </div>

                <div class="form-group">
                    <label>交易類型</label>
                    <div class="toggle-group">
                        <div class="toggle-btn active" id="btn-general" onclick="setTransactionType('一般收支')">一般收支</div>
                        <div class="toggle-btn" id="btn-transfer" onclick="setTransactionType('帳戶戶轉')">帳戶戶轉</div>
                    </div>
                    <input type="hidden" id="form-transactionType" value="一般收支">
                </div>

                <div id="group-general" style="display: block;">

                    <div class="form-group">
                        <label>收支類型</label>
                        <div class="toggle-group">
                            <div class="toggle-btn active" id="btn-ie-expense" onclick="setIEType('支出')">支出</div>
                            <div class="toggle-btn" id="btn-ie-income" onclick="setIEType('收入')">收入</div>
                            <div class="toggle-btn" id="btn-ie-repay" onclick="setIEType('還款收入')">還款收入</div>
                        </div>
                        <input type="hidden" id="form-incomeExpenseType" value="支出">
                    </div>

                    <div id="fg-category" class="form-group" style="display: block;">
                        <label>帳目類型</label>
                        <select id="form-category">
                            <option value="生活費">生活費</option>
                            <option value="必要支出">必要支出</option>
                            <option value="儲蓄投資">儲蓄投資</option>
                            <option value="娛樂">娛樂</option>
                            <option value="奉獻">奉獻</option>
                        </select>
                    </div>

                    <div id="fg-paymentType" class="form-group" style="display: block;">
                        <label>支付類型</label>
                        <select id="form-paymentType">
                            <option value="郵局">郵局</option>
                            <option value="國泰">國泰</option>
                            <option value="華南">華南</option>
                            <option value="錢包">錢包</option>
                            <option value="信用卡">信用卡</option>
                        </select>
                    </div>

                    <div id="fg-incomeAccount" class="form-group" style="display: none;">
                        <label>收入帳目</label>
                        <select id="form-incomeAccount">
                            <option value="郵局">郵局</option>
                            <option value="國泰">國泰</option>
                            <option value="華南">華南</option>
                            <option value="錢包">錢包</option>
                        </select>
                    </div>

                    <div id="fg-expenseAmount" class="form-group" style="display: block;">
                        <label>支出金額</label>
                        <input type="number" id="form-expenseAmount" placeholder="請輸入金額">
                    </div>

                    <div id="fg-incomeAmount" class="form-group" style="display: none;">
                        <label>收入金額</label>
                        <input type="number" id="form-incomeAmount" placeholder="請輸入金額">
                    </div>

                    <div id="fg-note" class="form-group" style="display: block;">
                        <label>備註說明</label>
                        <input type="text" id="form-note" placeholder="選填">
                    </div>
                </div>

                <div id="group-transfer" style="display: none;">
                    <div class="form-group">
                        <label>轉出帳戶</label>
                        <select id="form-transferOut">
                            <option value="郵局">郵局</option>
                            <option value="國泰">國泰</option>
                            <option value="華南">華南</option>
                            <option value="錢包">錢包</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>轉入帳戶</label>
                        <select id="form-transferIn">
                            <option value="郵局">郵局</option>
                            <option value="國泰">國泰</option>
                            <option value="華南">華南</option>
                            <option value="錢包">錢包</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>轉帳金額</label>
                        <input type="number" id="form-transferAmount" placeholder="請輸入轉帳金額">
                    </div>
                </div>

                <button id="btn-submit" class="submit-btn" onclick="submitRecord()">💾 儲存紀錄</button>
            </div>
        </div>

        <div id="page-report" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>收支報表</h2>
                <div style="margin-left:auto; font-size:24px; cursor:pointer;" onclick="openBudgetEdit()">⚙️</div>
            </div>

            <div id="report-container">
                <div class="placeholder-box">資料讀取中...</div>
            </div>
        </div>

        <div id="page-budget-edit" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-report')">❮</div>
                <h2>設定項目與預算</h2>
            </div>

            <div
                style="background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--card-border);">
                <div id="budget-items-list">
                </div>

                <button onclick="addBudgetRow()"
                    style="width:100%; padding:10px; margin-top:10px; background:transparent; border:1px dashed #d6a5ff; color:#d6a5ff; border-radius:10px; cursor:pointer;">＋
                    新增項目</button>

                <div id="budget-total-indicator"
                    style="text-align:center; margin: 20px 0; font-weight:bold; font-size:18px;">總預算比例：0%</div>

                <button id="btn-save-budget" class="submit-btn" onclick="saveBudgetSettings()">💾 儲存並寫入公式</button>
            </div>
        </div>

        <div id="page-details" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>收支明細</h2>
            </div>
            <div class="placeholder-box">這裡將列出每天的每一筆記帳資料</div>
        </div>

        <div id="page-chart" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>支出報告圖</h2>
            </div>
            <div class="placeholder-box">這裡將串接圓餅圖或長條圖 (Chart.js)</div>
        </div>

        <div id="page-raw" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>原始資料</h2>
            </div>
            <div class="placeholder-box">這裡將直接顯示從 Google Sheet 撈回來的原始陣列資料</div>
        </div>

    </div>

    <script>
        // 網頁載入時觸發的初始設定
        window.addEventListener('load', () => {
            updateMonthDisplay(); // 更新頂部月份顯示
            spawnRandomDino();    // 召喚雲端恐龍

            // 如果一打開網頁就在報表頁，就先讀取一次
            if (document.getElementById('page-report').classList.contains('active')) {
                loadReport();
            }
        });

        const dinoImages = [
            'pexels-tkirkgoz-12845496.jpg',
            'pexels-footage-kingdom-122917970-13825209.jpg',
            'pexels-footage-kingdom-122917970-13825468.jpg',
            'pexels-enginakyurt-6348818.jpg'
        ];
        // ================= 前端控制邏輯 =================
        // 1. 頁面切換引擎
        // ================= 前端控制邏輯 =================

        // 💡 修復 1：確保網頁完全載入後，才去設定預設日期 (防呆機制)
        window.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('form-date');
            if (dateInput) {
                dateInput.valueAsDate = new Date();
            }
        });

        // 💡 修復 2：頁面切換引擎 (加入自動觸發讀取報表的功能)
        function switchPage(pageId) {
            // 將所有 page 隱藏
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // 顯示目標頁面
            document.getElementById(pageId).classList.add('active');

            // 切換頁面時自動捲動到最上方
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // ★ 新增：如果切換到「收支報表」頁面，自動去讀取最新資料
            if (pageId === 'page-report') {
                loadReport();
            }
        }

        // 2. 月份切換與雲端同步邏輯
        let currentDate = new Date();

        function updateMonthDisplay() {
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            document.getElementById('current-month-display').innerText = `${year}年 ${month}月`;
        }

        // 當點選左右箭頭切換月份時觸發
        async function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            updateMonthDisplay(); // 先更新前端顯示，達到秒開流暢感

            // 呼叫下方的新功能：將新月份同步到 Google Sheet 的「月份」工作表
            await syncMonthToGoogleSheet();
        }

        // 新增：將當前網頁選定的年、月送給 GAS 
        async function syncMonthToGoogleSheet() {
            const API_URL = "https://script.google.com/macros/s/AKfycbxe7e6g3TOC0mPoQZPIKabS10IHBCdkIIZUQ_ykjRluoQPHoLwPcwlHEmYYIreFD09fRQ/exec";

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1; // 轉為 1~12 月數字

            try {
                // 發送 POST 請求，指定 action 為 updateSelectedMonth
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "updateSelectedMonth",
                        year: year,
                        month: month
                    })
                });

                const result = await response.json();
                if (result.success) {
                    console.log("📊 雲端月份更新成功:", year, "年", month, "月");
                    // 💡 未來這裡可以再擴充：重新 fetch 該月份最新演算出來的 帳目餘額、明細 等資料
                } else {
                    console.error("同步月份失敗:", result.message);
                }
            } catch (error) {
                console.error("網路連線錯誤(同步月份):", error.message);
            }
        }

        // 初始化執行
        window.onload = function () {
            updateMonthDisplay();
        };
        // 3. 送出記帳資料到 GAS (API 串接)
        async function submitRecord() {
            // 已經為您替換為專屬的 GAS API 網址
            const API_URL = "https://script.google.com/macros/s/AKfycbxe7e6g3TOC0mPoQZPIKabS10IHBCdkIIZUQ_ykjRluoQPHoLwPcwlHEmYYIreFD09fRQ/exec";

            const type = document.getElementById('record-type').value;
            const date = document.getElementById('record-date').value;
            const category = document.getElementById('record-category').value;
            const amount = document.getElementById('record-amount').value;
            const note = document.getElementById('record-note').value;
            const btn = document.getElementById('btn-submit');

            if (!date || !amount) {
                alert("請填寫日期與金額！");
                return;
            }

            // 鎖定按鈕，顯示載入中
            btn.innerText = "⏳ 儲存中...";
            btn.disabled = true;

            const payload = { type, date, category, amount, note };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    // 處理跨域請求的常見寫法，確保 GAS 能正確接收
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    alert("✅ 記帳成功！");
                    document.getElementById('record-amount').value = ''; // 清空金額
                    document.getElementById('record-note').value = '';   // 清空備註
                    switchPage('page-home'); // 回到首頁
                } else {
                    alert("❌ 發生錯誤：" + result.message);
                }
            } catch (error) {
                alert("❌ 網路連線錯誤：" + error.message);
            } finally {
                // 恢復按鈕狀態
                btn.innerText = "💾 儲存記帳";
                btn.disabled = false;
            }
        }
        // 註冊 Service Worker (PWA 核心)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 註冊成功！', reg))
                    .catch(err => console.log('Service Worker 註冊失敗：', err));
            });
        }
        // 設定今天的日期為預設值
        document.getElementById('form-date').valueAsDate = new Date();

        // 控制表單欄位「顯示 / 隱藏」的動態邏輯
        function updateFormVisibility() {
            const transType = document.getElementById('form-transactionType').value;
            const groupGeneral = document.getElementById('group-general');
            const groupTransfer = document.getElementById('group-transfer');

            if (transType === '帳戶戶轉') {
                groupGeneral.style.display = 'none';
                groupTransfer.style.display = 'block';
            } else {
                groupGeneral.style.display = 'block';
                groupTransfer.style.display = 'none';

                const ieType = document.getElementById('form-incomeExpenseType').value;
                // 先隱藏一般收支裡的所有細項
                ['fg-category', 'fg-paymentType', 'fg-incomeAccount', 'fg-expenseAmount', 'fg-incomeAmount'].forEach(id => {
                    document.getElementById(id).style.display = 'none';
                });

                // 依據收支類型顯示對應欄位
                if (ieType === '支出') {
                    document.getElementById('fg-category').style.display = 'block';
                    document.getElementById('fg-paymentType').style.display = 'block';
                    document.getElementById('fg-expenseAmount').style.display = 'block';
                } else if (ieType === '收入') {
                    document.getElementById('fg-incomeAccount').style.display = 'block';
                    document.getElementById('fg-incomeAmount').style.display = 'block';
                } else if (ieType === '還款收入') {
                    document.getElementById('fg-category').style.display = 'block';
                    document.getElementById('fg-incomeAccount').style.display = 'block';
                    document.getElementById('fg-incomeAmount').style.display = 'block';
                }
            }
        }

        // 將資料打包並送出給 GAS
        async function submitRecord() {
            // ★★★ 請保留您最新的 GAS Web App 網址 ★★★
            const API_URL = "https://script.google.com/macros/s/AKfycbxe7e6g3TOC0mPoQZPIKabS10IHBCdkIIZUQ_ykjRluoQPHoLwPcwlHEmYYIreFD09fRQ/exec";

            const btn = document.getElementById('btn-submit');
            const payload = {}; // 準備要送出的資料包

            payload.date = document.getElementById('form-date').value;
            payload.transactionType = document.getElementById('form-transactionType').value;

            // 檢查防呆邏輯並打包對應資料
            if (payload.transactionType === '帳戶戶轉') {
                payload.transferOut = document.getElementById('form-transferOut').value;
                payload.transferIn = document.getElementById('form-transferIn').value;
                payload.transferAmount = document.getElementById('form-transferAmount').value;
                if (!payload.transferAmount) return alert("請輸入轉帳金額！");
                if (payload.transferOut === payload.transferIn) return alert("轉出與轉入不能是同一個帳戶！");
            } else {
                payload.incomeExpenseType = document.getElementById('form-incomeExpenseType').value;
                payload.note = document.getElementById('form-note').value;

                if (payload.incomeExpenseType === '支出') {
                    payload.category = document.getElementById('form-category').value;
                    payload.paymentType = document.getElementById('form-paymentType').value;
                    payload.expenseAmount = document.getElementById('form-expenseAmount').value;
                    if (!payload.expenseAmount) return alert("請輸入支出金額！");
                } else if (payload.incomeExpenseType === '收入') {
                    payload.incomeAccount = document.getElementById('form-incomeAccount').value;
                    payload.incomeAmount = document.getElementById('form-incomeAmount').value;
                    if (!payload.incomeAmount) return alert("請輸入收入金額！");
                } else if (payload.incomeExpenseType === '還款收入') {
                    payload.category = document.getElementById('form-category').value;
                    payload.incomeAccount = document.getElementById('form-incomeAccount').value;
                    payload.incomeAmount = document.getElementById('form-incomeAmount').value;
                    if (!payload.incomeAmount) return alert("請輸入收入金額！");
                }
            }

            // 鎖定按鈕
            btn.innerText = "⏳ 儲存中...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {
                    alert("✅ 記帳成功！");
                    // 清空輸入框
                    document.getElementById('form-expenseAmount').value = '';
                    document.getElementById('form-incomeAmount').value = '';
                    document.getElementById('form-transferAmount').value = '';
                    document.getElementById('form-note').value = '';
                    switchPage('page-home');
                } else {
                    alert("❌ 發生錯誤：" + result.message);
                }
            } catch (error) {
                alert("❌ 網路連線錯誤：" + error.message);
            } finally {
                btn.innerText = "💾 儲存紀錄";
                btn.disabled = false;
            }
        }
        // 處理雙按鈕的點擊切換與外觀更新
        function setTransactionType(type) {
            // 更新隱藏的值
            document.getElementById('form-transactionType').value = type;

            // 切換按鈕的 Active 狀態 (外觀)
            if (type === '一般收支') {
                document.getElementById('btn-general').classList.add('active');
                document.getElementById('btn-transfer').classList.remove('active');
            } else {
                document.getElementById('btn-transfer').classList.add('active');
                document.getElementById('btn-general').classList.remove('active');
            }

            // 呼叫原本的隱藏/顯示邏輯
            updateFormVisibility();
        }
        function setIEType(type) {
            // 更新隱藏的值
            document.getElementById('form-incomeExpenseType').value = type;

            // 先移除所有按鈕的 active 狀態
            document.getElementById('btn-ie-expense').classList.remove('active');
            document.getElementById('btn-ie-income').classList.remove('active');
            document.getElementById('btn-ie-repay').classList.remove('active');

            // 根據選取的類型加上 active 狀態
            if (type === '支出') {
                document.getElementById('btn-ie-expense').classList.add('active');
            } else if (type === '收入') {
                document.getElementById('btn-ie-income').classList.add('active');
            } else if (type === '還款收入') {
                document.getElementById('btn-ie-repay').classList.add('active');
            }

            // 呼叫原本的隱藏/顯示邏輯，讓下方欄位自動變化
            updateFormVisibility();
        }
        // ================= 恐龍生成系統 (雲端動態版) =================
        async function spawnRandomDino() {
            // ★★★ 確保這裡的網址是您最新的 GAS API 網址 ★★★
            const API_URL = "https://script.google.com/macros/s/AKfycbxe7e6g3TOC0mPoQZPIKabS10IHBCdkIIZUQ_ykjRluoQPHoLwPcwlHEmYYIreFD09fRQ/exec";

            try {
                // 向 GAS 請求圖片清單 (加上 ?action=getImages)
                const response = await fetch(API_URL + "?action=getImages");
                const result = await response.json();

                // 如果成功拿到圖片陣列，且資料夾不是空的
                if (result.success && result.images.length > 0) {
                    const container = document.querySelector('.app-container');

                    // 隨機抽一張圖
                    const randomImgUrl = result.images[Math.floor(Math.random() * result.images.length)];

                    const dinoImg = document.createElement('img');
                    dinoImg.src = randomImgUrl;
                    dinoImg.className = 'dino-mascot';

                    // 隨機決定大小與位置
                    dinoImg.style.width = Math.floor(Math.random() * 120 + 250) + 'px';
                    dinoImg.style.bottom = Math.floor(Math.random() * 20 + 10) + '%';

                    if (Math.random() > 0.5) {
                        dinoImg.style.left = '-30px';
                    } else {
                        dinoImg.style.right = '-30px';
                        dinoImg.style.transform = 'scaleX(-1)';
                    }

                    container.appendChild(dinoImg);
                }
            } catch (error) {
                console.log("無法召喚恐龍：", error);
            }
        }
        // ================= 報表與預算設定邏輯 =================

        // 1. 讀取並渲染報表
        // 1. 讀取並渲染報表 (全新精緻排版版)
        async function loadReport() {
            const container = document.getElementById('report-container');
            container.innerHTML = `<div class="placeholder-box">⏳ 正在計算當月報表...</div>`;

            // 您的 GAS API 網址
            const API_URL = "https://script.google.com/macros/s/AKfycbxe7e6g3TOC0mPoQZPIKabS10IHBCdkIIZUQ_ykjRluoQPHoLwPcwlHEmYYIreFD09fRQ/exec";

            try {
                const response = await fetch(API_URL + "?action=getReport");
                const result = await response.json();

                if (result.success) {
                    const data = result.data;

                    // 💡 調整 1：將「本月總收入」字樣改為直接用金額顯示（data.totalIncome[1] 是總收入金額）
                    let html = `
                    <div style="background: rgba(46, 204, 113, 0.15); border: 1px solid rgba(46, 204, 113, 0.4); padding: 18px; border-radius: 16px; margin-bottom: 25px; text-align:center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
                        <div style="font-size: 24px; font-weight: bold; color: #2ecc71; font-family: monospace;">$ ${data.totalIncome[1]}</div>
                    </div>
                `;

                    // 項目卡片排版
                    data.items.forEach(item => {
                        // 欄位定義：item[0]=項目名稱, item[1]=預算比例, item[2]=預算金額, item[3]=實際支出, item[4]=上月餘額, item[5]=結餘金額

                        html += `
                    <div style="background: var(--card-bg); border: 1px solid var(--card-border); padding: 18px 15px; border-radius: 16px; margin-bottom: 15px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; gap: 10px;">
                        
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
                            
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <span style="font-weight: bold; color: white; font-size: 18px; letter-spacing: 0.5px;">${item[0]}</span>
                                <span style="font-size: 14px; color: var(--text-muted);">預算: <span style="color:#e0e0e0;">$${item[2]}</span></span>
                            </div>
                            
                            <div style="display: flex; gap: 20px; font-size: 13px; color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px;">
                                <span>上月餘額: <span style="color: #9aa0a6;">$${item[4]}</span></span>
                                <span>支出: <span style="color: #ff7675;">$${item[3]}</span></span>
                            </div>
                        </div>
                        
                        <div style="text-align: right; min-width: 100px; padding-left: 10px; border-left: 1px solid rgba(255,255,255,0.08);">
                            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 3px; letter-spacing: 0.5px;">本月結餘</div>
                            <div style="font-size: 20px; font-weight: bold; color: #d6a5ff; font-family: monospace;">$${item[5]}</div>
                        </div>

                    </div>`;
                    });

                    // 總結餘底部卡片
                    html += `
                    <div style="background: linear-gradient(135deg, rgba(159,53,255,0.3), rgba(89,28,158,0.5)); border: 1px solid rgba(214, 165, 255, 0.4); padding: 18px; border-radius: 16px; margin-top: 25px; text-align:center; box-shadow: 0 8px 25px rgba(159, 53, 255, 0.2);">
                        <div style="font-size:13px; color:#e0e0e0; opacity: 0.8; margin-bottom: 5px; letter-spacing: 1px;">總餘額</div>
                        <div style="font-size:32px; font-weight:bold; color:white; font-family: monospace;">$ ${data.totalBalance[5]}</div>
                    </div>
                `;
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<div class="placeholder-box" style="color:var(--red);">❌ 運算失敗：${result.message}</div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="placeholder-box" style="color:var(--red);">❌ 讀取失敗，請確認網路連線。</div>`;
            }
        }
        // 2. 開啟編輯面板 (帶入空欄位或舊資料)
        let editingItems = [];
        function openBudgetEdit() {
            switchPage('page-budget-edit');
            // 這裡您可以預設帶入幾筆，或是先給一筆空的
            editingItems = [{ name: "生活費", ratio: 50 }];
            renderBudgetRows();
        }

        function addBudgetRow() {
            if (editingItems.length >= 19) return alert("最多只能設定 19 個項目喔！");
            editingItems.push({ name: "", ratio: 0 });
            renderBudgetRows();
        }

        function removeBudgetRow(index) {
            editingItems.splice(index, 1);
            renderBudgetRows();
        }

        function renderBudgetRows() {
            const list = document.getElementById('budget-items-list');
            list.innerHTML = "";
            let totalRatio = 0;

            editingItems.forEach((item, idx) => {
                totalRatio += Number(item.ratio);
                list.innerHTML += `
                <div style="display:flex; gap:10px; margin-bottom:15px; align-items:center;">
                    <input type="text" placeholder="項目名稱" value="${item.name}" onchange="editingItems[${idx}].name=this.value" style="flex:2; padding:10px; border-radius:8px; border:1px solid var(--card-border); background:rgba(0,0,0,0.3); color:white;">
                    <input type="number" placeholder="%" value="${item.ratio}" onchange="editingItems[${idx}].ratio=this.value; renderBudgetRows();" style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--card-border); background:rgba(0,0,0,0.3); color:white; text-align:center;">
                    <div style="color:var(--red); font-size:24px; cursor:pointer;" onclick="removeBudgetRow(${idx})">✖</div>
                </div>
            `;
            });

            // 100% 防呆檢查
            const indicator = document.getElementById('budget-total-indicator');
            const btn = document.getElementById('btn-save-budget');
            indicator.innerText = `總預算比例：${totalRatio}%`;

            if (totalRatio === 100) {
                indicator.style.color = "var(--green)";
                btn.disabled = false;
                btn.style.opacity = "1";
            } else {
                indicator.style.color = "var(--red)";
                btn.disabled = true;
                btn.style.opacity = "0.5"; // 沒達到 100% 按鈕反灰
            }
        }

        // 3. 儲存設定到後端
        async function saveBudgetSettings() {
            const btn = document.getElementById('btn-save-budget');
            btn.innerText = "⏳ 寫入公式中...";

            // 整理資料：將 50% 轉為 0.5 送給試算表
            const payloadItems = editingItems.map(item => ({
                name: item.name,
                ratio: Number(item.ratio) / 100
            }));

            const API_URL = "https://script.google.com/macros/s/AKfycbxe7e6g3TOC0mPoQZPIKabS10IHBCdkIIZUQ_ykjRluoQPHoLwPcwlHEmYYIreFD09fRQ/exec";
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "updateBudget", items: payloadItems })
                });
                const result = await response.json();
                if (result.success) {
                    alert("✅ 設定完成！公式已全面更新。");
                    switchPage('page-report');
                    loadReport(); // 重新讀取新報表
                }
            } catch (error) {
                alert("❌ 儲存失敗：" + error.message);
            } finally {
                btn.innerText = "💾 儲存並寫入公式";
            }
        }
    </script>
