<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4b6cb7">
    <title>專屬記帳 APP</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />

    <style>
        /* ================= 系統共用變數與全域設定 (科技黑夜風) ================= */
        :root {
            /* 主色調：科技紫搭配發光效果 */
            --primary: rgba(159, 53, 255, 0.8);
            --primary-glow: rgba(159, 53, 255, 0.4);
            /* 背景與卡片：深邃黑與毛玻璃 */
            --bg: #12121a;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            /* 文字顏色 */
            --text-main: #ffffff;
            --text-muted: #9aa0a6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #08080c;
            /* 電腦版外圍純黑背景 */
            color: var(--text-main);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            font-size: 16px;
            color-scheme: dark;
            /* 讓瀏覽器原生的捲軸、日期選擇器自動變暗色 */
        }

        /* 手機直版框架 + 背景環境光點綴 */
        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background-color: var(--bg);
            /* 加入右上角的隱約紫色環境光 */
            background-image: radial-gradient(circle at 80% 0%, rgba(159, 53, 255, 0.15) 0%, transparent 40%);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow-x: hidden;
        }

        .page {
            display: none;
            padding: 20px;
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            padding-bottom: 100px;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
                filter: blur(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* ================= 元件樣式 (毛玻璃與發光) ================= */

        /* 頂部月份切換器 */
        .month-selector {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            /* 毛玻璃模糊效果 */
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #d6a5ff;
            /* 亮紫色文字 */
            font-size: 18px;
        }

        .month-selector button {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0 10px;
            transition: color 0.2s;
        }

        .month-selector button:active {
            color: white;
        }

        /* 主視覺：帳目餘額卡片 */
        .balance-card {
            background: linear-gradient(135deg, rgba(159, 53, 255, 0.6) 0%, rgba(89, 28, 158, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 24px;
            padding: 25px;
            /* 強烈的科技發光陰影 */
            box-shadow: 0 12px 30px var(--primary-glow), inset 0 2px 5px rgba(255, 255, 255, 0.2);
            margin-bottom: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* 卡片內部的反光裝飾線 */
        .balance-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: skewX(-25deg);
        }

        .balance-card .title {
            font-size: 15px;
            opacity: 0.8;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .balance-card .amount {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 15px;
            font-family: monospace;
        }

        .balance-card .details {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 15px;
            border-radius: 14px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 選單網格 */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .menu-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .menu-item:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.08);
        }

        .menu-item .icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        .menu-item .text {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        /* 浮動新增按鈕 (FAB) */
        .fab {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #b864ff, #801acc);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 34px;
            box-shadow: 0 8px 25px var(--primary-glow);
            cursor: pointer;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .fab:active {
            transform: scale(0.9) rotate(15deg);
        }

        /* 第二層頁面共用標頭 */
        .page-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--card-border);
        }

        .page-header .back-btn {
            font-size: 22px;
            margin-right: 15px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .page-header h2 {
            margin: 0;
            font-size: 20px;
            color: white;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* ================= 表單專屬樣式 (暗黑科技感) ================= */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* 輸入框暗黑化與完美置中修復 */
        .form-group input,
        .form-group select {
            width: 98%;
            /* 縮小一點點，避免瀏覽器計算誤差撐破畫面 */
            margin: 0 auto;
            /* 強制水平置中 */
            padding: 14px 15px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            font-size: 16px;
            font-family: inherit;
            background-color: rgba(0, 0, 0, 0.2);
            color: white;
            box-sizing: border-box;
            display: block;
            /* 確保 margin: 0 auto 能生效 */
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        /* 針對日期的圖示反白 */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
        }

        /* 切換按鈕暗黑化 */
        .toggle-group {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            padding: 6px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--card-border);
        }

        .toggle-btn {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            white-space: nowrap;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* 底部儲存按鈕 */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #b864ff, #801acc);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 6px 20px var(--primary-glow);
            transition: transform 0.1s;
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        /* ================= 恐龍全息投影特效 ================= */
        .dino-mascot {
            position: absolute;
            z-index: 0;
            opacity: 0.35;
            /* 因為拿掉濾鏡了，透明度稍微調高一點讓原圖更清楚 */
            pointer-events: none;

            /* 修改遮罩：把 black 30% 縮小到 15%，透明邊界從 70% 縮小到 60%，這樣就能切除更多邊緣，只保留主體 */
            mask-image: radial-gradient(circle at center, black 15%, transparent 60%);
            -webkit-mask-image: radial-gradient(circle at center, black 15%, transparent 60%);

            animation: floatDino 6s ease-in-out infinite alternate;
            /* ★ 已經將原本的 filter (紫色濾鏡) 刪除，現在會完全呈現照片原本的顏色！ */
        }

        @keyframes floatDino {
            0% {
                transform: translateY(0px) rotate(-2deg);
            }

            100% {
                transform: translateY(-15px) rotate(2deg);
            }
        }

        /* 確保所有頁面內容在恐龍之上 */
        .page {
            position: relative;
            z-index: 10;
        }

        /* 調整新圖標的大小與排版 */
        .menu-item .material-symbols-outlined {
            font-size: 36px;
            margin-bottom: 12px;
            display: block;
            color: #d6a5ff;
            /* 統一使用亮紫色 */
            filter: drop-shadow(0 0 8px var(--primary-glow));
            /* 圖標發光 */
        }
    </style>
</head>

<body>

    <div class="app-container">

        <div id="page-home" class="page active">

            <div class="month-selector">
                <button onclick="changeMonth(-1)">❮</button>
                <span id="current-month-display">2026年 06月</span>
                <button onclick="changeMonth(1)">❯</button>
            </div>

            <div class="balance-card">
                <div class="title">本月結餘 (淨利潤)</div>
                <div class="amount" id="balance-amount">$ 15,400</div>
                <div class="details">
                    <div>📥 收入: $20,000</div>
                    <div>📤 支出: $4,600</div>
                </div>
            </div>

            <div class="menu-grid">
                <div class="menu-item" onclick="switchPage('page-report')">
                    <span class="material-symbols-outlined">bar_chart</span>
                    <span class="text">收支報表</span>
                </div>
                <div class="menu-item" onclick="switchPage('page-details')">
                    <span class="material-symbols-outlined">receipt_long</span>
                    <span class="text">收支明細</span>
                </div>
                <div class="menu-item" onclick="switchPage('page-chart')">
                    <span class="material-symbols-outlined">donut_small</span>
                    <span class="text">支出報告圖</span>
                </div>
                <div class="menu-item" onclick="switchPage('page-raw')">
                    <span class="material-symbols-outlined">database</span>
                    <span class="text">原始資料</span>
                </div>
            </div>

            <div class="fab" onclick="switchPage('page-add')">＋</div>
        </div>


        <div id="page-add" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>新增記帳</h2>
            </div>

            <div
                style="background: var(--card-bg); padding: 25px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">

                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="form-date">
                </div>

                <div class="form-group">
                    <label>交易類型</label>
                    <div class="toggle-group">
                        <div class="toggle-btn active" id="btn-general" onclick="setTransactionType('一般收支')">一般收支</div>
                        <div class="toggle-btn" id="btn-transfer" onclick="setTransactionType('帳戶戶轉')">帳戶戶轉</div>
                    </div>
                    <input type="hidden" id="form-transactionType" value="一般收支">
                </div>

                <div id="group-general" style="display: block;">

                    <div class="form-group">
                        <label>收支類型</label>
                        <div class="toggle-group">
                            <div class="toggle-btn active" id="btn-ie-expense" onclick="setIEType('支出')">支出</div>
                            <div class="toggle-btn" id="btn-ie-income" onclick="setIEType('收入')">收入</div>
                            <div class="toggle-btn" id="btn-ie-repay" onclick="setIEType('還款收入')">還款收入</div>
                        </div>
                        <input type="hidden" id="form-incomeExpenseType" value="支出">
                    </div>

                    <div id="fg-category" class="form-group" style="display: block;">
                        <label>帳目類型</label>
                        <select id="form-category">
                            <option value="生活費">生活費</option>
                            <option value="必要支出">必要支出</option>
                            <option value="儲蓄投資">儲蓄投資</option>
                            <option value="娛樂">娛樂</option>
                            <option value="奉獻">奉獻</option>
                        </select>
                    </div>

                    <div id="fg-paymentType" class="form-group" style="display: block;">
                        <label>支付類型</label>
                        <select id="form-paymentType">
                            <option value="郵局">郵局</option>
                            <option value="國泰">國泰</option>
                            <option value="華南">華南</option>
                            <option value="錢包">錢包</option>
                            <option value="信用卡">信用卡</option>
                        </select>
                    </div>

                    <div id="fg-incomeAccount" class="form-group" style="display: none;">
                        <label>收入帳目</label>
                        <select id="form-incomeAccount">
                            <option value="郵局">郵局</option>
                            <option value="國泰">國泰</option>
                            <option value="華南">華南</option>
                            <option value="錢包">錢包</option>
                        </select>
                    </div>

                    <div id="fg-expenseAmount" class="form-group" style="display: block;">
                        <label>支出金額</label>
                        <input type="number" id="form-expenseAmount" placeholder="請輸入金額">
                    </div>

                    <div id="fg-incomeAmount" class="form-group" style="display: none;">
                        <label>收入金額</label>
                        <input type="number" id="form-incomeAmount" placeholder="請輸入金額">
                    </div>

                    <div id="fg-note" class="form-group" style="display: block;">
                        <label>備註說明</label>
                        <input type="text" id="form-note" placeholder="選填">
                    </div>
                </div>

                <div id="group-transfer" style="display: none;">
                    <div class="form-group">
                        <label>轉出帳戶</label>
                        <select id="form-transferOut">
                            <option value="郵局">郵局</option>
                            <option value="國泰">國泰</option>
                            <option value="華南">華南</option>
                            <option value="錢包">錢包</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>轉入帳戶</label>
                        <select id="form-transferIn">
                            <option value="郵局">郵局</option>
                            <option value="國泰">國泰</option>
                            <option value="華南">華南</option>
                            <option value="錢包">錢包</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>轉帳金額</label>
                        <input type="number" id="form-transferAmount" placeholder="請輸入轉帳金額">
                    </div>
                </div>

                <button id="btn-submit" class="submit-btn" onclick="submitRecord()">💾 儲存紀錄</button>
            </div>
        </div>

        <div id="page-report" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>收支報表</h2>
            </div>
            <div class="placeholder-box">這裡將顯示本月的各項財務統計數據</div>
        </div>

        <div id="page-details" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>收支明細</h2>
            </div>
            <div class="placeholder-box">這裡將列出每天的每一筆記帳資料</div>
        </div>

        <div id="page-chart" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>支出報告圖</h2>
            </div>
            <div class="placeholder-box">這裡將串接圓餅圖或長條圖 (Chart.js)</div>
        </div>

        <div id="page-raw" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>原始資料</h2>
            </div>
            <div class="placeholder-box">這裡將直接顯示從 Google Sheet 撈回來的原始陣列資料</div>
        </div>

    </div>

    <script>
        // 網頁載入時觸發
        window.addEventListener('load', () => {
            updateMonthDisplay();
            spawnRandomDino(); // 召喚一隻恐龍
        });

        const dinoImages = [
            'pexels-tkirkgoz-12845496.jpg',
            'pexels-footage-kingdom-122917970-13825209.jpg',
            'pexels-footage-kingdom-122917970-13825468.jpg',
            'pexels-enginakyurt-6348818.jpg'
        ];
        // ================= 前端控制邏輯 =================
        // 1. 頁面切換引擎
        function switchPage(pageId) {
            // 將所有 page 隱藏
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // 顯示目標頁面
            document.getElementById(pageId).classList.add('active');

            // 切換頁面時自動捲動到最上方
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 2. 月份切換邏輯 (雛形)
        let currentDate = new Date(); // 預設為現在時間

        function updateMonthDisplay() {
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            document.getElementById('current-month-display').innerText = `${year}年 ${month}月`;

            // 💡 未來這裡可以加入：重新 fetch() 該月份的記帳資料
            // console.log("載入新月份資料:", year, month);
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            updateMonthDisplay();
        }

        // 初始化執行
        window.onload = function () {
            updateMonthDisplay();
        };
        // 自動將日期預設為今天
        document.getElementById('record-date').valueAsDate = new Date();

        // 3. 送出記帳資料到 GAS (API 串接)
        async function submitRecord() {
            // 已經為您替換為專屬的 GAS API 網址
            const API_URL = "https://script.google.com/macros/s/AKfycbxe7e6g3TOC0mPoQZPIKabS10IHBCdkIIZUQ_ykjRluoQPHoLwPcwlHEmYYIreFD09fRQ/exec";

            const type = document.getElementById('record-type').value;
            const date = document.getElementById('record-date').value;
            const category = document.getElementById('record-category').value;
            const amount = document.getElementById('record-amount').value;
            const note = document.getElementById('record-note').value;
            const btn = document.getElementById('btn-submit');

            if (!date || !amount) {
                alert("請填寫日期與金額！");
                return;
            }

            // 鎖定按鈕，顯示載入中
            btn.innerText = "⏳ 儲存中...";
            btn.disabled = true;

            const payload = { type, date, category, amount, note };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    // 處理跨域請求的常見寫法，確保 GAS 能正確接收
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    alert("✅ 記帳成功！");
                    document.getElementById('record-amount').value = ''; // 清空金額
                    document.getElementById('record-note').value = '';   // 清空備註
                    switchPage('page-home'); // 回到首頁
                } else {
                    alert("❌ 發生錯誤：" + result.message);
                }
            } catch (error) {
                alert("❌ 網路連線錯誤：" + error.message);
            } finally {
                // 恢復按鈕狀態
                btn.innerText = "💾 儲存記帳";
                btn.disabled = false;
            }
        }
        // 註冊 Service Worker (PWA 核心)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 註冊成功！', reg))
                    .catch(err => console.log('Service Worker 註冊失敗：', err));
            });
        }
        // 設定今天的日期為預設值
        document.getElementById('form-date').valueAsDate = new Date();

        // 控制表單欄位「顯示 / 隱藏」的動態邏輯
        function updateFormVisibility() {
            const transType = document.getElementById('form-transactionType').value;
            const groupGeneral = document.getElementById('group-general');
            const groupTransfer = document.getElementById('group-transfer');

            if (transType === '帳戶戶轉') {
                groupGeneral.style.display = 'none';
                groupTransfer.style.display = 'block';
            } else {
                groupGeneral.style.display = 'block';
                groupTransfer.style.display = 'none';

                const ieType = document.getElementById('form-incomeExpenseType').value;
                // 先隱藏一般收支裡的所有細項
                ['fg-category', 'fg-paymentType', 'fg-incomeAccount', 'fg-expenseAmount', 'fg-incomeAmount'].forEach(id => {
                    document.getElementById(id).style.display = 'none';
                });

                // 依據收支類型顯示對應欄位
                if (ieType === '支出') {
                    document.getElementById('fg-category').style.display = 'block';
                    document.getElementById('fg-paymentType').style.display = 'block';
                    document.getElementById('fg-expenseAmount').style.display = 'block';
                } else if (ieType === '收入') {
                    document.getElementById('fg-incomeAccount').style.display = 'block';
                    document.getElementById('fg-incomeAmount').style.display = 'block';
                } else if (ieType === '還款收入') {
                    document.getElementById('fg-category').style.display = 'block';
                    document.getElementById('fg-incomeAccount').style.display = 'block';
                    document.getElementById('fg-incomeAmount').style.display = 'block';
                }
            }
        }

        // 將資料打包並送出給 GAS
        async function submitRecord() {
            // ★★★ 請保留您最新的 GAS Web App 網址 ★★★
            const API_URL = "https://script.google.com/macros/s/AKfycbxe7e6g3TOC0mPoQZPIKabS10IHBCdkIIZUQ_ykjRluoQPHoLwPcwlHEmYYIreFD09fRQ/exec";

            const btn = document.getElementById('btn-submit');
            const payload = {}; // 準備要送出的資料包

            payload.date = document.getElementById('form-date').value;
            payload.transactionType = document.getElementById('form-transactionType').value;

            // 檢查防呆邏輯並打包對應資料
            if (payload.transactionType === '帳戶戶轉') {
                payload.transferOut = document.getElementById('form-transferOut').value;
                payload.transferIn = document.getElementById('form-transferIn').value;
                payload.transferAmount = document.getElementById('form-transferAmount').value;
                if (!payload.transferAmount) return alert("請輸入轉帳金額！");
                if (payload.transferOut === payload.transferIn) return alert("轉出與轉入不能是同一個帳戶！");
            } else {
                payload.incomeExpenseType = document.getElementById('form-incomeExpenseType').value;
                payload.note = document.getElementById('form-note').value;

                if (payload.incomeExpenseType === '支出') {
                    payload.category = document.getElementById('form-category').value;
                    payload.paymentType = document.getElementById('form-paymentType').value;
                    payload.expenseAmount = document.getElementById('form-expenseAmount').value;
                    if (!payload.expenseAmount) return alert("請輸入支出金額！");
                } else if (payload.incomeExpenseType === '收入') {
                    payload.incomeAccount = document.getElementById('form-incomeAccount').value;
                    payload.incomeAmount = document.getElementById('form-incomeAmount').value;
                    if (!payload.incomeAmount) return alert("請輸入收入金額！");
                } else if (payload.incomeExpenseType === '還款收入') {
                    payload.category = document.getElementById('form-category').value;
                    payload.incomeAccount = document.getElementById('form-incomeAccount').value;
                    payload.incomeAmount = document.getElementById('form-incomeAmount').value;
                    if (!payload.incomeAmount) return alert("請輸入收入金額！");
                }
            }

            // 鎖定按鈕
            btn.innerText = "⏳ 儲存中...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {
                    alert("✅ 記帳成功！");
                    // 清空輸入框
                    document.getElementById('form-expenseAmount').value = '';
                    document.getElementById('form-incomeAmount').value = '';
                    document.getElementById('form-transferAmount').value = '';
                    document.getElementById('form-note').value = '';
                    switchPage('page-home');
                } else {
                    alert("❌ 發生錯誤：" + result.message);
                }
            } catch (error) {
                alert("❌ 網路連線錯誤：" + error.message);
            } finally {
                btn.innerText = "💾 儲存紀錄";
                btn.disabled = false;
            }
        }
        // 處理雙按鈕的點擊切換與外觀更新
        function setTransactionType(type) {
            // 更新隱藏的值
            document.getElementById('form-transactionType').value = type;

            // 切換按鈕的 Active 狀態 (外觀)
            if (type === '一般收支') {
                document.getElementById('btn-general').classList.add('active');
                document.getElementById('btn-transfer').classList.remove('active');
            } else {
                document.getElementById('btn-transfer').classList.add('active');
                document.getElementById('btn-general').classList.remove('active');
            }

            // 呼叫原本的隱藏/顯示邏輯
            updateFormVisibility();
        }
        function setIEType(type) {
            // 更新隱藏的值
            document.getElementById('form-incomeExpenseType').value = type;

            // 先移除所有按鈕的 active 狀態
            document.getElementById('btn-ie-expense').classList.remove('active');
            document.getElementById('btn-ie-income').classList.remove('active');
            document.getElementById('btn-ie-repay').classList.remove('active');

            // 根據選取的類型加上 active 狀態
            if (type === '支出') {
                document.getElementById('btn-ie-expense').classList.add('active');
            } else if (type === '收入') {
                document.getElementById('btn-ie-income').classList.add('active');
            } else if (type === '還款收入') {
                document.getElementById('btn-ie-repay').classList.add('active');
            }

            // 呼叫原本的隱藏/顯示邏輯，讓下方欄位自動變化
            updateFormVisibility();
        }
        // ================= 恐龍生成系統 (雲端動態版) =================
        async function spawnRandomDino() {
            // ★★★ 確保這裡的網址是您最新的 GAS API 網址 ★★★
            const API_URL = "https://script.google.com/macros/s/AKfycbxe7e6g3TOC0mPoQZPIKabS10IHBCdkIIZUQ_ykjRluoQPHoLwPcwlHEmYYIreFD09fRQ/exec";

            try {
                // 向 GAS 請求圖片清單 (加上 ?action=getImages)
                const response = await fetch(API_URL + "?action=getImages");
                const result = await response.json();

                // 如果成功拿到圖片陣列，且資料夾不是空的
                if (result.success && result.images.length > 0) {
                    const container = document.querySelector('.app-container');

                    // 隨機抽一張圖
                    const randomImgUrl = result.images[Math.floor(Math.random() * result.images.length)];

                    const dinoImg = document.createElement('img');
                    dinoImg.src = randomImgUrl;
                    dinoImg.className = 'dino-mascot';

                    // 隨機決定大小與位置
                    dinoImg.style.width = Math.floor(Math.random() * 120 + 250) + 'px';
                    dinoImg.style.bottom = Math.floor(Math.random() * 20 + 10) + '%';

                    if (Math.random() > 0.5) {
                        dinoImg.style.left = '-30px';
                    } else {
                        dinoImg.style.right = '-30px';
                        dinoImg.style.transform = 'scaleX(-1)';
                    }

                    container.appendChild(dinoImg);
                }
            } catch (error) {
                console.log("無法召喚恐龍：", error);
            }
        }
    </script>
