<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4b6cb7">
    <title>專屬記帳 APP</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ================= 系統共用變數與全域設定 ================= */
        :root {
            --primary: #4b6cb7;
            /* 主色調：沉穩藍 */
            --secondary: #182848;
            /* 次色調：深海藍 */
            --bg: #f2f4f6;
            /* 系統背景色 (與師資系統一致) */
            --card-bg: #ffffff;
            /* 卡片背景色 */
            --text-main: #333333;
            --text-muted: #888888;
            --red: #e74c3c;
            /* 支出紅 */
            --green: #2ecc71;
            /* 收入綠 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            /* 讓版面在電腦版置中 */
        }

        /* 手機直版框架 (最大 500px) */
        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background-color: var(--bg);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow-x: hidden;
        }

        /* 頁面切換機制 */
        .page {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease-out;
            padding-bottom: 100px;
            /* 底部預留呼吸空間 */
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ================= 元件樣式 ================= */

        /* 1. 頂部月份切換器 (浮動感) */
        .month-selector {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary);
        }

        .month-selector button {
            background: none;
            border: none;
            font-size: 18px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0 10px;
        }

        /* 2. 主視覺：帳目餘額卡片 */
        .balance-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(75, 108, 183, 0.3);
            margin-bottom: 25px;
            text-align: center;
        }

        .balance-card .title {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .balance-card .amount {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .balance-card .details {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
        }

        /* 3. 選單網格 (九宮格感) */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .menu-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .menu-item:active {
            transform: scale(0.96);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .menu-item .icon {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
        }

        .menu-item .text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        /* 4. 浮動新增按鈕 (FAB) */
        .fab {
            position: absolute;
            /* 綁定在 app-container 內 */
            bottom: 30px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 8px 20px rgba(75, 108, 183, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 100;
        }

        .fab:active {
            transform: scale(0.9) rotate(15deg);
        }

        /* 5. 第二層頁面共用標頭 */
        .page-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eaeaea;
        }

        .page-header .back-btn {
            font-size: 20px;
            margin-right: 15px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .page-header h2 {
            margin: 0;
            font-size: 18px;
            color: var(--secondary);
        }

        /* 內容佔位符號 */
        .placeholder-box {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
            border: 2px dashed #ddd;
        }
    </style>
</head>

<body>

    <div class="app-container">

        <div id="page-home" class="page active">

            <div class="month-selector">
                <button onclick="changeMonth(-1)">❮</button>
                <span id="current-month-display">2026年 06月</span>
                <button onclick="changeMonth(1)">❯</button>
            </div>

            <div class="balance-card">
                <div class="title">本月結餘 (淨利潤)</div>
                <div class="amount" id="balance-amount">$ 15,400</div>
                <div class="details">
                    <div>📥 收入: $20,000</div>
                    <div>📤 支出: $4,600</div>
                </div>
            </div>

            <div class="menu-grid">
                <div class="menu-item" onclick="switchPage('page-report')">
                    <span class="icon">📊</span>
                    <span class="text">收支報表</span>
                </div>
                <div class="menu-item" onclick="switchPage('page-details')">
                    <span class="icon">📝</span>
                    <span class="text">收支明細</span>
                </div>
                <div class="menu-item" onclick="switchPage('page-chart')">
                    <span class="icon">pie_chart</span>
                    <span class="text">支出報告圖</span>
                </div>
                <div class="menu-item" onclick="switchPage('page-raw')">
                    <span class="icon">🗄️</span>
                    <span class="text">原始資料</span>
                </div>
            </div>

            <div class="fab" onclick="switchPage('page-add')">＋</div>
        </div>


        <div id="page-add" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>新增記帳</h2>
            </div>

            <div
                style="background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; color: var(--text-muted);">日期</label>
                    <input type="date" id="form-date"
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; color: var(--text-muted);">交易類型</label>
                    <select id="form-transactionType" onchange="updateFormVisibility()"
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                        <option value="一般收支">一般收支</option>
                        <option value="帳戶戶轉">帳戶戶轉</option>
                    </select>
                </div>

                <div id="group-general" style="display: block;">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; margin-bottom: 5px; color: var(--text-muted);">收支類型</label>
                        <select id="form-incomeExpenseType" onchange="updateFormVisibility()"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                            <option value="支出">📤 支出</option>
                            <option value="收入">📥 收入</option>
                            <option value="還款收入">🔙 還款收入</option>
                        </select>
                    </div>

                    <div id="fg-category" class="form-group" style="margin-bottom: 15px; display: block;">
                        <label style="display:block; margin-bottom: 5px; color: var(--text-muted);">帳目類型</label>
                        <select id="form-category"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                            <option value="生活費">生活費</option>
                            <option value="必要支出">必要支出</option>
                            <option value="儲蓄投資">儲蓄投資</option>
                            <option value="娛樂">娛樂</option>
                            <option value="奉獻">奉獻</option>
                        </select>
                    </div>

                    <div id="fg-paymentType" class="form-group" style="margin-bottom: 15px; display: block;">
                        <label style="display:block; margin-bottom: 5px; color: var(--text-muted);">支付類型</label>
                        <select id="form-paymentType"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                            <option value="郵局">郵局</option>
                            <option value="國泰">國泰</option>
                            <option value="華南">華南</option>
                            <option value="錢包">錢包</option>
                            <option value="信用卡">信用卡</option>
                        </select>
                    </div>

                    <div id="fg-incomeAccount" class="form-group" style="margin-bottom: 15px; display: none;">
                        <label style="display:block; margin-bottom: 5px; color: var(--text-muted);">收入帳目</label>
                        <select id="form-incomeAccount"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                            <option value="郵局">郵局</option>
                            <option value="國泰">國泰</option>
                            <option value="華南">華南</option>
                            <option value="錢包">錢包</option>
                        </select>
                    </div>

                    <div id="fg-expenseAmount" class="form-group" style="margin-bottom: 15px; display: block;">
                        <label style="display:block; margin-bottom: 5px; color: var(--text-muted);">支出金額</label>
                        <input type="number" id="form-expenseAmount" placeholder="輸入金額"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                    </div>

                    <div id="fg-incomeAmount" class="form-group" style="margin-bottom: 15px; display: none;">
                        <label style="display:block; margin-bottom: 5px; color: var(--text-muted);">收入金額</label>
                        <input type="number" id="form-incomeAmount" placeholder="輸入金額"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                    </div>

                    <div id="fg-note" class="form-group" style="margin-bottom: 20px; display: block;">
                        <label style="display:block; margin-bottom: 5px; color: var(--text-muted);">備註說明</label>
                        <input type="text" id="form-note" placeholder="選填"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                    </div>
                </div>

                <div id="group-transfer" style="display: none;">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; margin-bottom: 5px; color: var(--text-muted);">轉出帳戶</label>
                        <select id="form-transferOut"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                            <option value="郵局">郵局</option>
                            <option value="國泰">國泰</option>
                            <option value="華南">華南</option>
                            <option value="錢包">錢包</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; margin-bottom: 5px; color: var(--text-muted);">轉入帳戶</label>
                        <select id="form-transferIn"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                            <option value="郵局">郵局</option>
                            <option value="國泰">國泰</option>
                            <option value="華南">華南</option>
                            <option value="錢包">錢包</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display:block; margin-bottom: 5px; color: var(--text-muted);">轉帳金額</label>
                        <input type="number" id="form-transferAmount" placeholder="輸入轉帳金額"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                    </div>
                </div>

                <button id="btn-submit" onclick="submitRecord()"
                    style="width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold;">💾
                    儲存紀錄</button>
            </div>
        </div>

        <div id="page-report" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>收支報表</h2>
            </div>
            <div class="placeholder-box">這裡將顯示本月的各項財務統計數據</div>
        </div>

        <div id="page-details" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>收支明細</h2>
            </div>
            <div class="placeholder-box">這裡將列出每天的每一筆記帳資料</div>
        </div>

        <div id="page-chart" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>支出報告圖</h2>
            </div>
            <div class="placeholder-box">這裡將串接圓餅圖或長條圖 (Chart.js)</div>
        </div>

        <div id="page-raw" class="page">
            <div class="page-header">
                <div class="back-btn" onclick="switchPage('page-home')">❮</div>
                <h2>原始資料</h2>
            </div>
            <div class="placeholder-box">這裡將直接顯示從 Google Sheet 撈回來的原始陣列資料</div>
        </div>

    </div>

    <script>
        // ================= 前端控制邏輯 =================

        // 1. 頁面切換引擎
        function switchPage(pageId) {
            // 將所有 page 隱藏
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // 顯示目標頁面
            document.getElementById(pageId).classList.add('active');

            // 切換頁面時自動捲動到最上方
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 2. 月份切換邏輯 (雛形)
        let currentDate = new Date(); // 預設為現在時間

        function updateMonthDisplay() {
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            document.getElementById('current-month-display').innerText = `${year}年 ${month}月`;

            // 💡 未來這裡可以加入：重新 fetch() 該月份的記帳資料
            // console.log("載入新月份資料:", year, month);
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            updateMonthDisplay();
        }

        // 初始化執行
        window.onload = function () {
            updateMonthDisplay();
        };
        // 自動將日期預設為今天
        document.getElementById('record-date').valueAsDate = new Date();

        // 3. 送出記帳資料到 GAS (API 串接)
        async function submitRecord() {
            // 已經為您替換為專屬的 GAS API 網址
            const API_URL = "https://script.google.com/macros/s/AKfycbxe7e6g3TOC0mPoQZPIKabS10IHBCdkIIZUQ_ykjRluoQPHoLwPcwlHEmYYIreFD09fRQ/exec";

            const type = document.getElementById('record-type').value;
            const date = document.getElementById('record-date').value;
            const category = document.getElementById('record-category').value;
            const amount = document.getElementById('record-amount').value;
            const note = document.getElementById('record-note').value;
            const btn = document.getElementById('btn-submit');

            if (!date || !amount) {
                alert("請填寫日期與金額！");
                return;
            }

            // 鎖定按鈕，顯示載入中
            btn.innerText = "⏳ 儲存中...";
            btn.disabled = true;

            const payload = { type, date, category, amount, note };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    // 處理跨域請求的常見寫法，確保 GAS 能正確接收
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    alert("✅ 記帳成功！");
                    document.getElementById('record-amount').value = ''; // 清空金額
                    document.getElementById('record-note').value = '';   // 清空備註
                    switchPage('page-home'); // 回到首頁
                } else {
                    alert("❌ 發生錯誤：" + result.message);
                }
            } catch (error) {
                alert("❌ 網路連線錯誤：" + error.message);
            } finally {
                // 恢復按鈕狀態
                btn.innerText = "💾 儲存記帳";
                btn.disabled = false;
            }
        }
        // 註冊 Service Worker (PWA 核心)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 註冊成功！', reg))
                    .catch(err => console.log('Service Worker 註冊失敗：', err));
            });
        }
        // 設定今天的日期為預設值
        document.getElementById('form-date').valueAsDate = new Date();

        // 控制表單欄位「顯示 / 隱藏」的動態邏輯
        function updateFormVisibility() {
            const transType = document.getElementById('form-transactionType').value;
            const groupGeneral = document.getElementById('group-general');
            const groupTransfer = document.getElementById('group-transfer');

            if (transType === '帳戶戶轉') {
                groupGeneral.style.display = 'none';
                groupTransfer.style.display = 'block';
            } else {
                groupGeneral.style.display = 'block';
                groupTransfer.style.display = 'none';

                const ieType = document.getElementById('form-incomeExpenseType').value;
                // 先隱藏一般收支裡的所有細項
                ['fg-category', 'fg-paymentType', 'fg-incomeAccount', 'fg-expenseAmount', 'fg-incomeAmount'].forEach(id => {
                    document.getElementById(id).style.display = 'none';
                });

                // 依據收支類型顯示對應欄位
                if (ieType === '支出') {
                    document.getElementById('fg-category').style.display = 'block';
                    document.getElementById('fg-paymentType').style.display = 'block';
                    document.getElementById('fg-expenseAmount').style.display = 'block';
                } else if (ieType === '收入') {
                    document.getElementById('fg-incomeAccount').style.display = 'block';
                    document.getElementById('fg-incomeAmount').style.display = 'block';
                } else if (ieType === '還款收入') {
                    document.getElementById('fg-category').style.display = 'block';
                    document.getElementById('fg-incomeAccount').style.display = 'block';
                    document.getElementById('fg-incomeAmount').style.display = 'block';
                }
            }
        }

        // 將資料打包並送出給 GAS
        async function submitRecord() {
            // ★★★ 請保留您最新的 GAS Web App 網址 ★★★
            const API_URL = "https://script.google.com/macros/s/AKfycbxe7e6g3TOC0mPoQZPIKabS10IHBCdkIIZUQ_ykjRluoQPHoLwPcwlHEmYYIreFD09fRQ/exec";

            const btn = document.getElementById('btn-submit');
            const payload = {}; // 準備要送出的資料包

            payload.date = document.getElementById('form-date').value;
            payload.transactionType = document.getElementById('form-transactionType').value;

            // 檢查防呆邏輯並打包對應資料
            if (payload.transactionType === '帳戶戶轉') {
                payload.transferOut = document.getElementById('form-transferOut').value;
                payload.transferIn = document.getElementById('form-transferIn').value;
                payload.transferAmount = document.getElementById('form-transferAmount').value;
                if (!payload.transferAmount) return alert("請輸入轉帳金額！");
                if (payload.transferOut === payload.transferIn) return alert("轉出與轉入不能是同一個帳戶！");
            } else {
                payload.incomeExpenseType = document.getElementById('form-incomeExpenseType').value;
                payload.note = document.getElementById('form-note').value;

                if (payload.incomeExpenseType === '支出') {
                    payload.category = document.getElementById('form-category').value;
                    payload.paymentType = document.getElementById('form-paymentType').value;
                    payload.expenseAmount = document.getElementById('form-expenseAmount').value;
                    if (!payload.expenseAmount) return alert("請輸入支出金額！");
                } else if (payload.incomeExpenseType === '收入') {
                    payload.incomeAccount = document.getElementById('form-incomeAccount').value;
                    payload.incomeAmount = document.getElementById('form-incomeAmount').value;
                    if (!payload.incomeAmount) return alert("請輸入收入金額！");
                } else if (payload.incomeExpenseType === '還款收入') {
                    payload.category = document.getElementById('form-category').value;
                    payload.incomeAccount = document.getElementById('form-incomeAccount').value;
                    payload.incomeAmount = document.getElementById('form-incomeAmount').value;
                    if (!payload.incomeAmount) return alert("請輸入收入金額！");
                }
            }

            // 鎖定按鈕
            btn.innerText = "⏳ 儲存中...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {
                    alert("✅ 記帳成功！");
                    // 清空輸入框
                    document.getElementById('form-expenseAmount').value = '';
                    document.getElementById('form-incomeAmount').value = '';
                    document.getElementById('form-transferAmount').value = '';
                    document.getElementById('form-note').value = '';
                    switchPage('page-home');
                } else {
                    alert("❌ 發生錯誤：" + result.message);
                }
            } catch (error) {
                alert("❌ 網路連線錯誤：" + error.message);
            } finally {
                btn.innerText = "💾 儲存紀錄";
                btn.disabled = false;
            }
        }
    </script>

</body>

</html>
